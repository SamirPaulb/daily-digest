name: Generate Daily Digest

on:
  schedule:
    - cron: '0 23 * * *'    # 04:30 IST = 23:00 UTC (previous day)
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Run in test mode (validates all APIs, no output written)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write
  models: read

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: digest-pip-${{ hashFiles('scripts/requirements.txt') }}
          restore-keys: digest-pip-

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Remove existing digest for manual re-run
        if: github.event_name == 'workflow_dispatch'
        run: |
          DATE_ISO=$(TZ='Asia/Kolkata' date '+%Y-%m-%d')
          FILE="digests/${DATE_ISO}.html"
          if [ -f "$FILE" ]; then
            rm "$FILE"
            echo "Removed $FILE — will regenerate"
          else
            echo "No existing file for today — generating fresh"
          fi

      - name: Generate digest
        timeout-minutes: 90
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:     ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TAVILY_API_KEY:     ${{ secrets.TAVILY_API_KEY }}
          EXA_API_KEY:        ${{ secrets.EXA_API_KEY }}
          NEWS_API_KEY:       ${{ secrets.NEWS_API_KEY }}
          GNEWS_API_KEY:      ${{ secrets.GNEWS_API_KEY }}
          CURRENTS_API_KEY:   ${{ secrets.CURRENTS_API_KEY }}
          MEDIASTACK_API_KEY: ${{ secrets.MEDIASTACK_API_KEY }}
          NYTIMES_API_KEY:    ${{ secrets.NYTIMES_API_KEY }}
          FINNHUB_API_KEY:       ${{ secrets.FINNHUB_API_KEY }}
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
          MASSIVE_API_KEY:     ${{ secrets.MASSIVE_API_KEY }}
          TWELVEDATA_API_KEY:  ${{ secrets.TWELVEDATA_API_KEY }}
          DEEPSEEK_API_KEY:    ${{ secrets.DEEPSEEK_API_KEY }}
          MISTRAL_API_KEY:     ${{ secrets.MISTRAL_API_KEY }}
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          XAI_API_KEY:         ${{ secrets.XAI_API_KEY }}
          FIREWORKS_API_KEY:   ${{ secrets.FIREWORKS_API_KEY }}
          MOONSHOT_AI_API_KEY: ${{ secrets.MOONSHOT_AI_API_KEY }}
          MINIMAX_API_KEY:     ${{ secrets.MINIMAX_API_KEY }}
          ZAI_API_KEY:         ${{ secrets.ZAI_API_KEY }}
          GH_MODELS_PAT:       ${{ secrets.GH_MODELS_PAT }}
          WEBSEARCHAPIAI_API_KEY: ${{ secrets.WEBSEARCHAPIAI_API_KEY }}
          NEWSDATAIO_API_KEY: ${{ secrets.NEWSDATAIO_API_KEY }}
          WORLDNEWSAPI_API_KEY: ${{ secrets.WORLDNEWSAPI_API_KEY }}
          NEWSCATCHERAPI_API_KEY: ${{ secrets.NEWSCATCHERAPI_API_KEY }}
          # Model names (from Variables — update when deprecated, no code change)
          CLAUDE_MODEL:             ${{ vars.CLAUDE_MODEL }}
          CLAUDE_SEARCH_TOOL:       ${{ vars.CLAUDE_SEARCH_TOOL }}
          OPENAI_SEARCH_MODEL:      ${{ vars.OPENAI_SEARCH_MODEL }}
          OPENAI_MODEL:             ${{ vars.OPENAI_MODEL }}
          GEMINI_MODEL:             ${{ vars.GEMINI_MODEL }}
          OPENROUTER_SEARCH_MODEL:  ${{ vars.OPENROUTER_SEARCH_MODEL }}
          OPENROUTER_FREE_MODEL:    ${{ vars.OPENROUTER_FREE_MODEL }}
          DEEPSEEK_MODEL:           ${{ vars.DEEPSEEK_MODEL }}
          XAI_MODEL:                ${{ vars.XAI_MODEL }}
          GROQ_MODEL:               ${{ vars.GROQ_MODEL }}
          MISTRAL_MODEL:            ${{ vars.MISTRAL_MODEL }}
          FIREWORKS_MODEL:          ${{ vars.FIREWORKS_MODEL }}
          MOONSHOT_MODEL:           ${{ vars.MOONSHOT_MODEL }}
          MINIMAX_MODEL:            ${{ vars.MINIMAX_MODEL }}
          ZAI_MODEL:                ${{ vars.ZAI_MODEL }}
          GITHUB_MODEL:             ${{ vars.GITHUB_MODEL }}
          # Base URLs (from Variables — update if provider changes endpoint)
          OPENAI_BASE_URL:          ${{ vars.OPENAI_BASE_URL }}
          OPENROUTER_BASE_URL:      ${{ vars.OPENROUTER_BASE_URL }}
          DEEPSEEK_BASE_URL:        ${{ vars.DEEPSEEK_BASE_URL }}
          XAI_BASE_URL:             ${{ vars.XAI_BASE_URL }}
          GROQ_BASE_URL:            ${{ vars.GROQ_BASE_URL }}
          MISTRAL_BASE_URL:         ${{ vars.MISTRAL_BASE_URL }}
          FIREWORKS_BASE_URL:       ${{ vars.FIREWORKS_BASE_URL }}
          MOONSHOT_BASE_URL:        ${{ vars.MOONSHOT_BASE_URL }}
          MINIMAX_BASE_URL:         ${{ vars.MINIMAX_BASE_URL }}
          ZAI_BASE_URL:             ${{ vars.ZAI_BASE_URL }}
          GITHUB_MODELS_BASE_URL:   ${{ vars.GITHUB_MODELS_BASE_URL }}
          # Always available in Actions
          GITHUB_TOKEN:             ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ inputs.test_mode }}" = "true" ]; then
            # Install Ollama for test mode
            curl -fsSL https://ollama.com/install.sh | sh || curl -fsSL https://ollama.ai/install.sh | sh
            ollama serve &
            OLLAMA_PID=$!
            for i in $(seq 1 30); do
              curl -sf http://localhost:11434/api/tags > /dev/null 2>&1 && break
              sleep 1
            done
            ollama pull qwen2.5:7b-instruct-q4_K_M
            export OLLAMA_MODEL="qwen2.5:7b-instruct-q4_K_M"
            python scripts/generate_digest.py --test
            kill $OLLAMA_PID 2>/dev/null || true
          else
            python scripts/generate_digest.py
          fi

      # ── Workflow-level AI fallbacks ────────────────────────────────────────
      # If the Python script's AI providers all failed (data-only template),
      # try GitHub AI Inference (free) then Vercel AI Gateway as last resorts.
      - name: Check if workflow AI fallback needed
        if: inputs.test_mode != 'true'
        id: ai_fallback_check
        run: |
          DATE_ISO=$(TZ='Asia/Kolkata' date '+%Y-%m-%d')
          FILE="digests/${DATE_ISO}.html"
          if [ -f "$FILE" ] && grep -q "Data available with AI-powered digest" "$FILE"; then
            echo "needed=true" >> "$GITHUB_OUTPUT"
            echo "⚠️ AI sections missing — activating workflow AI fallbacks"
          else
            echo "needed=false" >> "$GITHUB_OUTPUT"
            echo "✅ AI sections present — no fallback needed"
          fi

      # Fallback 1: GitHub AI Inference (FREE — uses GITHUB_TOKEN)
      - name: Generate with GitHub AI Inference (free)
        if: steps.ai_fallback_check.outputs.needed == 'true'
        id: github_ai
        continue-on-error: true
        uses: actions/ai-inference@v1
        with:
          model: 'openai/gpt-4o'
          max-completion-tokens: '2048'
          system-prompt: 'You are a daily briefing writer for a tech-savvy Indian investor. Generate news sections in markdown. Format: ## Section Name followed by bullet points (- **Headline** — detail). Include: Global News, India, AI & Tech. Only real verifiable news. Separate sections with ---.'
          prompt: 'Generate today''s news digest sections. Do NOT include Markets. Start with ## Global News.'

      # Fallback 2: Vercel AI Gateway (if GitHub AI failed)
      - name: Generate with Vercel AI Gateway
        if: steps.ai_fallback_check.outputs.needed == 'true' && steps.github_ai.outcome != 'success'
        id: vercel_ai
        continue-on-error: true
        uses: vercel/ai-action@v2
        with:
          model: 'deepseek/deepseek-v4-flash'
          api-key: ${{ secrets.VERCEL_AI_GATEWAY_API_KEY }}
          system: 'You are a daily briefing writer. Generate news sections in markdown. Format: ## Section Name followed by bullet points (- **Headline** — detail). Include: Global News, India, AI & Tech. Only real news. Separate sections with ---.'
          prompt: 'Generate today''s news digest sections. Do NOT include Markets. Start with ## Global News.'

      # Merge whichever AI output succeeded into the digest
      - name: Merge AI fallback output into digest
        if: steps.ai_fallback_check.outputs.needed == 'true' && (steps.github_ai.outcome == 'success' || steps.vercel_ai.outcome == 'success')
        env:
          AI_OUTPUT: ${{ steps.github_ai.outputs.response || steps.vercel_ai.outputs.text }}
        run: |
          DATE_ISO=$(TZ='Asia/Kolkata' date '+%Y-%m-%d')
          FILE="digests/${DATE_ISO}.html"
          # Convert AI markdown to HTML
          echo "$AI_OUTPUT" | python -c "
          import sys, markdown as md, re
          text = sys.stdin.read()
          if not text.strip():
              sys.exit(0)
          html = md.markdown(text, extensions=['tables'])
          html = re.sub(r'<td>(\+[\d.]+%)</td>', r'<td class=\"change-positive\">\1</td>', html)
          html = re.sub(r'<td>(-[\d.]+%)</td>', r'<td class=\"change-negative\">\1</td>', html)
          print(html)
          " > /tmp/ai_sections.html
          # Keep market tables, replace everything after with AI output
          if [ -s /tmp/ai_sections.html ]; then
            python -c "
          import re, os
          date_iso = os.popen(\"TZ='Asia/Kolkata' date '+%Y-%m-%d'\").read().strip()
          filepath = f'digests/{date_iso}.html'
          with open(filepath) as f:
              content = f.read()
          tables = list(re.finditer(r'</table>', content))
          if tables:
              market_html = content[:tables[-1].end()]
          else:
              market_html = content
          with open('/tmp/ai_sections.html') as f:
              news_html = f.read()
          with open(filepath, 'w') as f:
              f.write(market_html + '\n' + news_html)
          "
            echo "✅ Merged AI fallback output into digest"
          fi

      # ── Ollama local AI fallback (last resort before commit) ──────────────
      # Runs only if ALL cloud AI failed AND workflow fallbacks failed.
      # Uses Qwen 2.5 7B Q4 — best quality-to-size ratio for 2-vCPU runners.
      - name: Check if Ollama fallback needed
        if: inputs.test_mode != 'true'
        id: ollama_check
        run: |
          DATE_ISO=$(TZ='Asia/Kolkata' date '+%Y-%m-%d')
          FILE="digests/${DATE_ISO}.html"
          if [ -f "$FILE" ] && grep -q "Data available with AI-powered digest" "$FILE"; then
            echo "needed=true" >> "$GITHUB_OUTPUT"
            echo "⚠️ All cloud AI failed — activating local Ollama fallback"
          else
            echo "needed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Ollama and regenerate with local model
        if: steps.ollama_check.outputs.needed == 'true'
        timeout-minutes: 45
        env:
          OLLAMA_MODEL: qwen2.5:7b-instruct-q4_K_M
        run: |
          # Install Ollama
          curl -fsSL https://ollama.com/install.sh | sh || curl -fsSL https://ollama.ai/install.sh | sh
          # Start server
          ollama serve &
          for i in $(seq 1 30); do
            curl -sf http://localhost:11434/api/tags > /dev/null 2>&1 && break
            sleep 1
          done
          # Pull model (Q4_K_M quantized — ~4.4GB, fits in runner RAM)
          ollama pull $OLLAMA_MODEL
          # Delete placeholder and regenerate
          DATE_ISO=$(TZ='Asia/Kolkata' date '+%Y-%m-%d')
          rm -f "digests/${DATE_ISO}.html"
          # Set OLLAMA_MODEL env so the Python script uses it at Level 2.5
          export OLLAMA_MODEL
          python scripts/generate_digest.py
          # Stop Ollama
          pkill ollama || true

      - name: Commit generated files
        if: inputs.test_mode != 'true'
        run: |
          git config user.name "SamirPaulb"
          git config user.email "77569653+SamirPaulb@users.noreply.github.com"
          git add digests/ manifest.json
          if git diff --staged --quiet; then
            echo "No new digest generated — skipping commit"
          else
            git commit -m "Daily Digest — $(TZ='Asia/Kolkata' date '+%B %d, %Y')"
            git pull --rebase origin main
            git push
          fi
